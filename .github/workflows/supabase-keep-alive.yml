name: Supabase Keep Alive

on:
  schedule:
    # Berjalan otomatis setiap hari sekali pada jam 00:00 UTC
    - cron: '0 0 * * *' 
  workflow_dispatch: 
    # Menambahkan ini agar Anda bisa mengetesnya secara manual kapan saja

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          echo "Memulai ping ke Supabase API..."
          curl -sS --fail -X GET '${{ secrets.SUPABASE_URL }}/rest/v1/user?select=*&limit=1' \
          -H 'apikey: ${{ secrets.SUPABASE_ANON_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}'
          echo -e "\nPing berhasil! Proyek Supabase tetap aktif."

